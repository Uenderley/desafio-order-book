services:
  postgres:
    image: postgres:16-alpine
    container_name: orderbook-postgres
    environment:
      POSTGRES_DB: orderbook
      POSTGRES_USER: orderbook
      POSTGRES_PASSWORD: orderbook
    ports:
      - "2345:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderbook -d orderbook"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
