# Application
quarkus.application.name=order-book

# PostgreSQL (producao/dev)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=orderbook
quarkus.datasource.password=orderbook
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/orderbook

# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# Jackson
quarkus.jackson.serialization-inclusion=non-null
